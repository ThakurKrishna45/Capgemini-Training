spring:
  application:
    name: Capgi_BankAccount
  datasource:
    url: jdbc:postgresql://localhost:5432/bankAccount
    username: postgres
    password: 1
    driver-class-name: org.postgresql.Driver

  # MOVE THIS INSIDE 'spring'
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    # Optional: Disable the annoying 'open-in-view' warning from your logs
    open-in-view: false